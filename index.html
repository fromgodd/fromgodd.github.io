<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        canvas {
            display: block;
            touch-action: none;
        }
        
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 14px;
            letter-spacing: 2px;
            opacity: 1;
            transition: opacity 0.5s;
        }
        
        #loading.hide {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loading">LOADING</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let shapes = [];
        let mouse = { x: 0, y: 0 };
        let targetMouse = { x: 0, y: 0 };
        
        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x0a0a0a, 10, 35);
            
            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x0a0a0a, 1);
            document.body.appendChild(renderer.domElement);
            
            // Lights
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);
            
            const pointLight1 = new THREE.PointLight(0x00ffff, 1, 50);
            pointLight1.position.set(10, 10, 10);
            scene.add(pointLight1);
            
            const pointLight2 = new THREE.PointLight(0xff00ff, 1, 50);
            pointLight2.position.set(-10, -10, 5);
            scene.add(pointLight2);
            
            // Create wireframe shapes
            createShapes();
            
            // Event listeners
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('touchmove', onTouchMove);
            
            // Hide loading
            setTimeout(() => {
                document.getElementById('loading').classList.add('hide');
            }, 500);
            
            animate();
        }
        
        function createShapes() {
            // Torus
            const torusGeo = new THREE.TorusGeometry(3, 0.8, 16, 50);
            const torusMat = new THREE.MeshBasicMaterial({ 
                color: 0x00ffff, 
                wireframe: true,
                transparent: true,
                opacity: 0.6
            });
            const torus = new THREE.Mesh(torusGeo, torusMat);
            torus.position.set(-4, 2, 0);
            torus.userData = { 
                speedX: 0.002, 
                speedY: 0.003,
                floatSpeed: 0.0008,
                floatAmount: 2
            };
            scene.add(torus);
            shapes.push(torus);
            
            // Icosahedron
            const icoGeo = new THREE.IcosahedronGeometry(2.5, 0);
            const icoMat = new THREE.MeshBasicMaterial({ 
                color: 0xff00ff, 
                wireframe: true,
                transparent: true,
                opacity: 0.7
            });
            const ico = new THREE.Mesh(icoGeo, icoMat);
            ico.position.set(4, -2, -2);
            ico.userData = { 
                speedX: 0.003, 
                speedY: 0.002,
                floatSpeed: 0.001,
                floatAmount: 1.5
            };
            scene.add(ico);
            shapes.push(ico);
            
            // Octahedron
            const octaGeo = new THREE.OctahedronGeometry(2, 0);
            const octaMat = new THREE.MeshBasicMaterial({ 
                color: 0x00ff88, 
                wireframe: true,
                transparent: true,
                opacity: 0.65
            });
            const octa = new THREE.Mesh(octaGeo, octaMat);
            octa.position.set(0, 0, -4);
            octa.userData = { 
                speedX: 0.0025, 
                speedY: 0.0035,
                floatSpeed: 0.0012,
                floatAmount: 1.8
            };
            scene.add(octa);
            shapes.push(octa);
        }
        
        function onMouseMove(e) {
            targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }
        
        function onTouchMove(e) {
            if (e.touches.length > 0) {
                targetMouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
                targetMouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
            }
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            
            // Smooth mouse follow
            mouse.x += (targetMouse.x - mouse.x) * 0.05;
            mouse.y += (targetMouse.y - mouse.y) * 0.05;
            
            // Camera subtle movement based on mouse
            camera.position.x = mouse.x * 2;
            camera.position.y = mouse.y * 2;
            camera.lookAt(scene.position);
            
            // Animate shapes
            shapes.forEach((shape, i) => {
                // Rotation
                shape.rotation.x += shape.userData.speedX;
                shape.rotation.y += shape.userData.speedY;
                
                // Floating motion
                shape.position.y += Math.sin(time * shape.userData.floatSpeed + i) * 0.01;
                shape.position.x += Math.cos(time * shape.userData.floatSpeed * 0.7 + i) * 0.008;
                
                // Depth oscillation for DOF effect
                shape.position.z += Math.sin(time * 0.0005 + i * 2) * 0.015;
                
                // Subtle scale pulse
                const scale = 1 + Math.sin(time * 0.5 + i) * 0.03;
                shape.scale.set(scale, scale, scale);
                
                // Opacity pulse for glow effect
                shape.material.opacity = 0.5 + Math.sin(time + i) * 0.15;
            });
            
            renderer.render(scene, camera);
        }
        
        // Initialize
        init();
    </script>
</body>
</html>
